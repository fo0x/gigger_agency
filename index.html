document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

x solid var(--line-2); border-radius: 10px;\n  padding: 12px;\n}\n.hv-kpi-lbl { font: 500 9px 'DM Sans'; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }\n.hv-kpi-val { font: 500 20px 'DM Sans'; letter-spacing: -0.02em; color: var(--ink); margin-top: 6px; line-height: 1; }\n.hv-kpi-delta { display: inline-flex; align-items: center; gap: 3px; font: 500 10px 'DM Sans'; color: #2E8B57; margin-top: 6px; }\n.hv-kpi-delta.down { color: var(--muted); }\n\n/* Pipeline table */\n.hv-table {\n  border: 1px solid var(--line-2); border-radius: 10px;\n  overflow: hidden;\n}\n.hv-thead {\n  display: grid;\n  grid-template-columns: 1.6fr 1fr 0.9fr 0.8fr;\n  background: var(--paper);\n  padding: 9px 12px;\n  font: 500 9px 'DM Sans'; letter-spacing: 0.12em; text-transform: uppercase;\n  color: var(--muted);\n  border-bottom: 1px solid var(--line-2);\n}\n.hv-trow {\n  display: grid;\n  grid-template-columns: 1.6fr 1fr 0.9fr 0.8fr;\n  padding: 10px 12px;\n  align-items: center;\n  font-size: 12px;\n  border-bottom: 1px solid var(--line-2);\n}\n.hv-trow:last-child { border-bottom: 0; }\n.hv-trow-partner { display: flex; align-items: center; gap: 8px; min-width: 0; }\n.hv-trow-partner .av { width: 22px; height: 22px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }\n.hv-trow-partner .av img { width: 100%; height: 100%; object-fit: cover; display: block; }\n.hv-trow-partner .name { font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n.hv-trow-partner .sub { font-size: 10px; color: var(--muted); margin-top: 1px; }\n.hv-trow-client { font-weight: 500; color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n.hv-trow-val { font-weight: 500; font-family: 'DM Sans'; color: var(--ink); }\n.hv-badge {\n  display: inline-flex; align-items: center; gap: 4px;\n  padding: 3px 8px; border-radius: 999px;\n  font: 500 9px 'DM Sans'; letter-spacing: 0.08em; text-transform: uppercase;\n  whi iv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== USED BY ============== -->\n<div class=\"used-by\">\n  <div class=\"wrap used-by-inner\">\n    <span class=\"used-by-label\">Running on Gigger<\u002Fspan>\n    <span class=\"logo-placeholder\">Northline<\u002Fspan>\n    <span class=\"logo-placeholder\">Parallel Studio<\u002Fspan>\n    <span class=\"logo-placeholder\">Kindred Brand<\u002Fspan>\n    <span class=\"logo-placeholder\">Raintown<\u002Fspan>\n    <span class=\"logo-placeholder\">Ovid &amp; Co.<\u002Fspan>\n    <span class=\"logo-placeholder\">Compass<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============== PROBLEM ============== -->\n<section class=\"problem\">\n  <div class=\"wrap\">\n    <div class=\"problem-grid\">\n      <div>\n        <span class=\"eyebrow\" style=\"color: rgba(246,243,236,.5);\">The problem<\u002Fspan>\n        <h2 style=\"margin-top: 20px;\">Partners drive real revenue. No one has a system for them.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"color: rgba(246,243,236,.65);\">Agencies close real money through referrals. The infrastructure to manage those referrals doesn't exist. Everyone's operating from spreadsheets, chat threads, and memory.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"problem-stats\">\n      <div class=\"pstat\">\n        <div class=\"pstat-num accent\">40<span class=\"pct\">%<\u002Fspan><\u002Fdiv>\n        <div class=\"pstat-lbl\">of agency revenue comes from partner referrals.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pstat\">\n        <div class=\"pstat-num\">0<\u002Fdiv>\n        <div class=\"pstat-lbl\">agencies have a structured system to manage it.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"pain-list\">\n      <div class=\"pain-item\"><span class=\"n\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z\"><\u002Fpath><\u002Fsvg><\u002Fspan><span>Manual outreach.<\u002Fspan><\u002Fdiv>\n      <div class=\"pain-item\"><span class=\"n\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg><\u002Fspan><span>Agreements over email and chats.<\u002Fspan><\u002Fdiv>\n      <div class=\"pain-item\"><span class=\"n\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><path d=\"M3 9h18M3 15h18M9 3v18M15 3v18\"><\u002Fpath><\u002Fsvg><\u002Fspan><span>Leads in a spreadsheet nobody updates.<\u002Fspan><\u002Fdiv>\n      <div class=\"pain-item\"><span class=\"n\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 12a8 8 0 1 1-8-8\"><\u002Fpath><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg><\u002Fspan><span>Partners who go cold because they never hear back.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== HOW IT WORKS ============== -->\n<section class=\"steps\" id=\"how\">\n  <div class=\"wrap\">\n    <div class=\"steps-head\">\n      <div>\n        <div class=\"eyebrow\">How it works<\u002Fdiv>\n        <h2 style=\"margin-top: 20px;\">One platform. Your entire partner program.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"lede\">Share your Gigger link anywhere. Partners land on your branded page, see exactly what you offer, sign the agreement, and start submitting leads. No calls needed until you both want to talk.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- step 1 -->\n    <div class=\"step\">\n      <div class=\"step-copy\">\n        <span class=\"step-num\">STEP 01 / SHARE<\u002Fspan>\n        <h3 class=\"step-title\">Share your partner page anywhere.<\u002Fh3>\n        <p class=\"step-body\">Your branded Gigger page is a public URL. Drop it on your website, in email signatures, LinkedIn DMs, or anywhere you talk to potential partners.<\u002Fp>\n        <div class=\"step-meta\">\n          <div class=\"step-meta-item\"><span class=\"dot\"><\u002Fspan>Your logo, services, commission terms<\u002Fdiv>\n          <div class=\"step-meta-item\"><span class=\"dot\"><\u002Fspan>Case studies &amp; proof points<\u002Fdiv>\n          <div class=\"step-meta-item\"><span class=\"dot\"><\u002Fspan>Works 24/7 — no scheduling required<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step-visual\">\n        <div class=\"sv-share\">\n          <div class=\"sv-share-card\">\n            <div class=\"sv-share-logo\">NL<\u002Fdiv>\n            <div class=\"sv-share-url\"><span class=\"domain\">northline.com/<\u002Fspan>partners<\u002Fdiv>\n            <button class=\"sv-share-copy\">Copy link<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"sv-channels\">\n            <div class=\"sv-ch\"><div class=\"sv-ch-ic\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M3 12h18M12 3c2.5 3 2.5 15 0 18M12 3c-2.5 3-2.5 15 0 18\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>Your website<\u002Fdiv>\n            <div class=\"sv-ch\"><div class=\"sv-ch-ic\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"m3 7 9 6 9-6\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>Email signature<\u002Fdiv>\n            <div class=\"sv-ch\"><div class=\"sv-ch-ic\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><path d=\"M8 10v8M8 6.5V7M12 13v5M12 10c0-2 4-2 4 1v4\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>LinkedIn profile<\u002Fdiv>\n            <div class=\"sv-ch\"><div class=\"sv-ch-ic\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"><path d=\"M22 12a10 10 0 1 1-4-8\"><\u002Fpath><path d=\"m17 9 5-5M22 9V4h-5\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>Cold outreach<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- step 2 -->\n    <div class=\"step\">\n      <div class=\"step-copy\">\n        <span class=\"step-num\">STEP 02 / ONBOARD<\u002Fspan>\n        <h3 class=\"step-title\">Partners e-sign, no back-and-forth.<\u002Fh3>\n        <p class=\"step-body\">Your terms are already on the page. Partners countersign with one click and land in your system — ready to start submitting leads. No chase-emails, no PDFs bouncing through inboxes.<\u002Fp>\n        <div class=\"step-meta\">\n          <div class=\"step-meta-item\"><span class=\"dot\"><\u002Fspan>Countersigned, timestamped, audit-ready<\u002Fdiv>\n          <div class=\"step-meta-item\"><span class=\"dot\"><\u002Fspan>Custom terms per partner if needed<\u002Fdiv>\n          <div class=\"step-meta-item\"><span class=\"dot\"><\u002Fspan>Bring your own legal template<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step-visual\">\n        <div class=\"sv-sign\">\n venue with partnerships done right. Frameworks, contracts, commission models, and scripts we've learned from 50+ top-performing agencies.<\u002Fp>\n        <ul class=\"lm-list\">\n          <li>A commission model that actually motivates partners (and doesn't wreck your margins)<\u002Fli>\n          <li>The 5 partner archetypes — who to chase, who to avoid<\u002Fli>\n          <li>Copy-paste partner agreement template<\u002Fli>\n          <li>First-90-days activation checklist<\u002Fli>\n        <\u002Ful>\n        <form class=\"lm-form\" onsubmit=\"event.preventDefault(); this.classList.add('done'); this.querySelector('button').innerHTML='Sent ✓ Check your inbox';\">\n          <input type=\"email\" placeholder=\"you@agency.com\" required=\"\">\n          <button type=\"submit\">Send me the guide\n            <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M5 12h14M13 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fform>\n        <div class=\"lm-fineprint\">NO SPAM · UNSUBSCRIBE ANYTIME<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== FINAL CTA ============== -->\n<section class=\"final\">\n  <div class=\"wrap\">\n    <h2>Ready to turn your partnership channel into a real revenue line?<\u002Fh2>\n    <a class=\"btn final-btn\" href=\"#\">Apply to join beta\n      <svg class=\"arr\" width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M5 12h14M13 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n    <\u002Fa>\n    <div class=\"final-trust\">FREE DURING BETA · NO CREDIT CARD REQUIRED<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== FOOTER ============== -->\n<footer class=\"footer\">\n  <div class=\"wrap\">\n    <div class=\"ft-mark\">\n      <img class=\"ft-logo\" src=\"f6576ed9-7ae2-48f7-821e-3050d5d2e395\" alt=\"Gigger\">\n    <\u002Fdiv>\n    <div class=\"ft-tag\">The agency-to-agency partnership platform.<\u002Fdiv>\n    <div class=\"ft-base\">\n      <span>© 2026 Gigger Labs Ltd.<\u002Fspan>\n      <span class=\"ft-dot\">·<\u002Fspan>\n      <span>v0.9 · Beta<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- Tweaks -->\n<div class=\"tweaks-panel\" id=\"tweaks\">\n  <div class=\"tw-title\">Tweaks<\u002Fdiv>\n  <div class=\"tw-row\">\n    <label>Accent<\u002Flabel>\n    <div class=\"tw-swatches\" id=\"sw\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tw-row\">\n    <label>Density<\u002Flabel>\n    <div class=\"tw-swatches\" id=\"density-seg\" style=\"gap:4px;background:var(--bg);padding:3px;border-radius:8px;\">\n      <button data-val=\"compact\" style=\"flex:1;padding:6px 8px;border:0;background:transparent;border-radius:6px;font:500 11px 'DM Sans';cursor:pointer;\">Compact<\u002Fbutton>\n      <button data-val=\"comfortable\" style=\"flex:1;padding:6px 8px;border:0;background:transparent;border-radius:6px;font:500 11px 'DM Sans';cursor:pointer;\">Default<\u002Fbutton>\n      <button data-val=\"airy\" style=\"flex:1;padding:6px 8px;border:0;background:transparent;border-radius:6px;font:500 11px 'DM Sans';cursor:pointer;\">Airy<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\nfunction applyTweaks(t) {\n  const A = {\n    \"#534AB7\": { a: \"#534AB7\", h: \"#43399E\", s: \"#EDE9FA\" },\n    \"#1A1916\": { a: \"#1A1916\", h: \"#000000\", s: \"#EFEBE0\" },\n    \"#2E5B45\": { a: \"#2E5B45\", h: \"#234636\", s: \"#E7EFE9\" },\n    \"#B85411\": { a: \"#B85411\", h: \"#93420B\", s: \"#FBEDDE\" }\n  };\n  const x = A[t.accent] || A[\"#534AB7\"];\n  document.documentElement.style.setProperty('--accent', x.a);\n  document.documentElement.style.setProperty('--accent-hover', x.h);\n  document.documentElement.style.setProperty('--accent-soft', x.s);\n  document.body.className = `density-${t.density}`;\n}\napplyTweaks(TWEAKS);\n\n// build swatches\n(function(){\n  const sw = document.getElementById('sw');\n  [\"#534AB7\",\"#1A1916\",\"#2E5B45\",\"#B85411\"].forEach(c => {\n    const b = document.createElement('button');\n    b.className = 'tw-swatch' + (c === TWEAKS.accent ? ' active' : '');\n    b.style.background = c;\n    b.onclick = () => {\n      TWEAKS.accent = c;\n      sw.querySelectorAll('.tw-swatch').forEach(x => x.classList.remove('active'));\n      b.classList.add('active');\n      applyTweaks(TWEAKS);\n      try { parent.postMessage({type:'__edit_mode_set_keys', edits:{accent: c}}, '*'); } catch(e){}\n    };\n    sw.appendChild(b);\n  });\n  document.querySelectorAll('#density-seg button').forEach(b => {\n    if (b.dataset.val === TWEAKS.density) { b.style.background = '#fff'; b.style.color = 'var(--ink)'; }\n    b.onclick = () => {\n      document.querySelectorAll('#density-seg button').forEach(x => { x.style.background = 'transparent'; x.style.color = 'var(--muted)'; });\n      b.style.background = '#fff'; b.style.color = 'var(--ink)';\n      TWEAKS.density = b.dataset.val;\n      applyTweaks(TWEAKS);\n      try { parent.postMessage({type:'__edit_mode_set_keys', edits:{density: b.dataset.val}}, '*'); } catch(e){}\n    };\n  });\n})();\n\nwindow.addEventListener('message', (e) => {\n  const d = e.data || {};\n  if (d.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('open');\n  if (d.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('open');\n});\nsetTimeout(() => { try { parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(e){} }, 50);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
